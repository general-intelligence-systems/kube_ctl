    name: helm rollback
    options:
      - default_value: "false"
        name: cleanup-on-fail
        usage: |
          allow deletion of new resources created in this rollback when rollback fails
      - default_value: none
        name: dry-run
        usage: |
          simulates the operation without persisting changes. Must be one of: "none" (default), "client", or "server". '--dry-run=none' executes the operation normally and persists changes (no simulation). '--dry-run=client' simulates the operation client-side only and avoids cluster connections. '--dry-run=server' simulates the operation on the server, requiring cluster connectivity.
      - default_value: "false"
        name: force
        usage: deprecated
      - default_value: "false"
        name: force-conflicts
        usage: |
          if set server-side apply will force changes against conflicts
      - default_value: "false"
        name: force-replace
        usage: force resource updates by replacement
      - default_value: "false"
        name: help
        shorthand: h
        usage: help for rollback
      - default_value: "10"
        name: history-max
        usage: |
          limit the maximum number of revisions saved per release. Use 0 for no limit
      - default_value: "false"
        name: no-hooks
        usage: prevent hooks from running during rollback
      - default_value: auto
        name: server-side
        usage: |
          must be "true", "false" or "auto". Object updates run in the server instead of the client ("auto" defaults the value from the previous chart release's method)
      - default_value: 5m0s
        name: timeout
        usage: |
          time to wait for any individual Kubernetes operation (like Jobs for hooks)
      - default_value: hookOnly
        name: wait
        usage: |
          if specified, wait until resources are ready (up to --timeout). Values: 'watcher', 'hookOnly', and 'legacy'.
      - default_value: "false"
        name: wait-for-jobs
        usage: |
          if set and --wait enabled, will wait until all Jobs have been completed before marking the release as successful. It will wait for as long as --timeout
