commands:
  - description: |
      The Kubernetes package manager

      Common actions for Helm:

      - helm search:    search for charts
      - helm pull:      download a chart to your local directory to view
      - helm install:   upload the chart to Kubernetes
      - helm list:      list releases of charts

      Environment variables:

      | Name                               | Description                                                                                                |
      |------------------------------------|------------------------------------------------------------------------------------------------------------|
      | $HELM_CACHE_HOME                   | set an alternative location for storing cached files.                                                      |
      | $HELM_CONFIG_HOME                  | set an alternative location for storing Helm configuration.                                                |
      | $HELM_DATA_HOME                    | set an alternative location for storing Helm data.                                                         |
      | $HELM_DEBUG                        | indicate whether or not Helm is running in Debug mode                                                      |
      | $HELM_DRIVER                       | set the backend storage driver. Values are: configmap, secret, memory, sql.                                |
      | $HELM_DRIVER_SQL_CONNECTION_STRING | set the connection string the SQL storage driver should use.                                               |
      | $HELM_MAX_HISTORY                  | set the maximum number of helm release history.                                                            |
      | $HELM_NAMESPACE                    | set the namespace used for the helm operations.                                                            |
      | $HELM_NO_PLUGINS                   | disable plugins. Set HELM_NO_PLUGINS=1 to disable plugins.                                                 |
      | $HELM_PLUGINS                      | set the path to the plugins directory                                                                      |
      | $HELM_REGISTRY_CONFIG              | set the path to the registry config file.                                                                  |
      | $HELM_REPOSITORY_CACHE             | set the path to the repository cache directory                                                             |
      | $HELM_REPOSITORY_CONFIG            | set the path to the repositories file.                                                                     |
      | $KUBECONFIG                        | set an alternative Kubernetes configuration file (default "~/.kube/config")                                |
      | $HELM_KUBEAPISERVER                | set the Kubernetes API Server Endpoint for authentication                                                  |
      | $HELM_KUBECAFILE                   | set the Kubernetes certificate authority file.                                                             |
      | $HELM_KUBEASGROUPS                 | set the Groups to use for impersonation using a comma-separated list.                                      |
      | $HELM_KUBEASUSER                   | set the Username to impersonate for the operation.                                                         |
      | $HELM_KUBECONTEXT                  | set the name of the kubeconfig context.                                                                    |
      | $HELM_KUBETOKEN                    | set the Bearer KubeToken used for authentication.                                                          |
      | $HELM_KUBEINSECURE_SKIP_TLS_VERIFY | indicate if the Kubernetes API server's certificate validation should be skipped (insecure)                |
      | $HELM_KUBETLS_SERVER_NAME          | set the server name used to validate the Kubernetes API server certificate                                 |
      | $HELM_BURST_LIMIT                  | set the default burst limit in the case the server contains many CRDs (default 100, -1 to disable)         |
      | $HELM_QPS                          | set the Queries Per Second in cases where a high number of calls exceed the option for higher burst values |
      | $HELM_COLOR                        | set color output mode. Allowed values: never, always, auto (default: never)                                |
      | $NO_COLOR                          | set to any non-empty value to disable all colored output (overrides $HELM_COLOR)                           |

      Helm stores cache, configuration, and data based on the following configuration order:

      - If a HELM_*_HOME environment variable is set, it will be used
      - Otherwise, on systems supporting the XDG base directory specification, the XDG variables will be used
      - When no other location is set a default location will be used based on the operating system

      By default, the default directories depend on the Operating System. The defaults are listed below:

      | Operating System | Cache Path                | Configuration Path             | Data Path               |
      |------------------|---------------------------|--------------------------------|-------------------------|
      | Linux            | $HOME/.cache/helm         | $HOME/.config/helm             | $HOME/.local/share/helm |
      | macOS            | $HOME/Library/Caches/helm | $HOME/Library/Preferences/helm | $HOME/Library/helm      |
      | Windows          | %TEMP%\helm               | %APPDATA%\helm                 | %APPDATA%\helm          |
    name: helm
    options:
      - default_value: "false"
        name: add-dir-header
        usage: |
          If true, adds the file directory to the header of the log messages
      - default_value: "false"
        name: alsologtostderr
        usage: |
          log to standard error as well as files (no effect when -logtostderr=true)
      - default_value: "100"
        name: burst-limit
        usage: client-side default throttling limit
      - default_value: auto
        name: color
        usage: use colored output (never, auto, always)
      - default_value: auto
        name: colour
        usage: use colored output (never, auto, always)
      - default_value: /home/coder/.cache/helm/content
        name: content-cache
        usage: |
          path to the directory containing cached content (e.g. charts)
      - default_value: "false"
        name: debug
        usage: enable verbose output
      - default_value: "false"
        name: help
        shorthand: h
        usage: help for helm
      - name: kube-apiserver
        usage: the address and the port for the Kubernetes API server
      - default_value: '[]'
        name: kube-as-group
        usage: |
          group to impersonate for the operation, this flag can be repeated to specify multiple groups.
      - name: kube-as-user
        usage: username to impersonate for the operation
      - name: kube-ca-file
        usage: |
          the certificate authority file for the Kubernetes API server connection
      - name: kube-context
        usage: name of the kubeconfig context to use
      - default_value: "false"
        name: kube-insecure-skip-tls-verify
        usage: |
          if true, the Kubernetes API server's certificate will not be checked for validity. This will make your HTTPS connections insecure
      - name: kube-tls-server-name
        usage: |
          server name to use for Kubernetes API server certificate validation. If it is not provided, the hostname used to contact the server is used
      - name: kube-token
        usage: bearer token used for authentication
      - name: kubeconfig
        usage: path to the kubeconfig file
      - default_value: :0
        name: log-backtrace-at
        usage: when logging hits line file:N, emit a stack trace
      - name: log-dir
        usage: |
          If non-empty, write log files in this directory (no effect when -logtostderr=true)
      - name: log-file
        usage: |
          If non-empty, use this log file (no effect when -logtostderr=true)
      - default_value: "1800"
        name: log-file-max-size
        usage: |
          Defines the maximum size a log file can grow to (no effect when -logtostderr=true). Unit is megabytes. If the value is 0, the maximum file size is unlimited.
      - default_value: "true"
        name: logtostderr
        usage: log to standard error instead of files
      - name: namespace
        shorthand: "n"
        usage: namespace scope for this request
      - default_value: "false"
        name: one-output
        usage: |
          If true, only write logs to their native severity level (vs also writing to each lower severity level; no effect when -logtostderr=true)
      - default_value: "0"
        name: qps
        usage: |
          queries per second used when communicating with the Kubernetes API, not including bursting
      - default_value: /home/coder/.config/helm/registry/config.json
        name: registry-config
        usage: path to the registry config file
      - default_value: /home/coder/.cache/helm/repository
        name: repository-cache
        usage: path to the directory containing cached repository indexes
      - default_value: /home/coder/.config/helm/repositories.yaml
        name: repository-config
        usage: path to the file containing repository names and URLs
      - default_value: "false"
        name: skip-headers
        usage: If true, avoid header prefixes in the log messages
      - default_value: "false"
        name: skip-log-headers
        usage: |
          If true, avoid headers when opening log files (no effect when -logtostderr=true)
      - default_value: "2"
        name: stderrthreshold
        usage: |
          logs at or above this threshold go to stderr when writing to files and stderr (no effect when -logtostderr=true or -alsologtostderr=true)
      - default_value: "0"
        name: v
        shorthand: v
        usage: number for the log level verbosity
      - name: vmodule
        usage: |
          comma-separated list of pattern=N settings for file-filtered logging
    see_also:
      - helm completion - generate autocompletion scripts for the specified shell
      - helm create - create a new chart with the given name
      - helm dependency - manage a chart's dependencies
      - helm env - helm client environment information
      - helm get - download extended information of a named release
      - helm history - fetch release history
      - helm install - install a chart
      - helm lint - examine a chart for possible issues
      - helm list - list releases
      - helm package - package a chart directory into a chart archive
      - helm plugin - install, list, or uninstall Helm plugins
      - helm pull - download a chart from a repository and (optionally) unpack it in local directory
      - helm push - push a chart to remote
      - helm registry - login to or logout from a registry
      - helm repo - add, list, remove, update, and index chart repositories
      - helm rollback - roll back a release to a previous revision
      - helm search - search for a keyword in charts
      - helm show - show information of a chart
      - helm status - display the status of the named release
      - helm template - locally render templates
      - helm test - run tests for a release
      - helm uninstall - uninstall a release
      - helm upgrade - upgrade a release
      - helm verify - verify that a chart at the given path has been signed and is valid
      - helm version - print the helm version information
    synopsis: The Helm package manager for Kubernetes.
