commands:
    - name: vcluster
      synopsis: Welcome to vcluster!
      description: vcluster root command
      usage: vcluster [flags]
      options:
        - name: config
          default_value: /home/nathan/.vcluster/config.json
          usage: The vcluster CLI config to use (will be created if it does not exist)
        - name: context
          usage: The kubernetes config context to use
        - name: debug
          default_value: "false"
          usage: Prints the stack trace if an error occurs
        - name: log-output
          default_value: plain
          usage: The log format to use. Can be either plain, raw or json
        - name: namespace
          shorthand: "n"
          usage: The kubernetes namespace to use
        - name: silent
          shorthand: s
          default_value: "false"
          usage: Run in silent mode and prevents any vcluster log output except panics & fatals
      see_also:
        - vcluster certs - vCluster certs subcommands
        - vcluster connect - Connect to a virtual cluster
        - vcluster create - Create a new virtual cluster
        - vcluster credits - Saves the OSS credits
        - vcluster debug - Debug retrieves information from vCluster
        - vcluster delete - Deletes a virtual cluster
        - vcluster describe - Describes a virtual cluster
        - vcluster disconnect - Disconnects from a vCluster platform context
        - vcluster list - Lists all virtual clusters
        - vcluster login - Log in to a vCluster platform instance
        - vcluster logout - Log out of a vCluster platform instance
        - vcluster node - vCluster node subcommand
        - vcluster pause - Pauses a virtual cluster
        - vcluster platform - vCluster platform subcommands
        - vcluster registry - vCluster registry subcommand
        - vcluster restore - Restores a virtual cluster from snapshot
        - vcluster resume - Resumes a virtual cluster
        - vcluster set - Set configuration
        - vcluster snapshot - Snapshot a virtual cluster (deprecated, use 'vcluster snapshot create' instead)
        - vcluster telemetry - Sets your vcluster telemetry preferences
        - vcluster token - vCluster token subcommand
        - vcluster ui - Start the web UI
        - vcluster upgrade - Upgrade the vcluster CLI to the newest version
        - vcluster use - vCluster use subcommand
        - vcluster version - Print the version number of vcluster
