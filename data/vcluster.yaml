        #########################################################################
        #################### vcluster debug ###################################
        #########################################################################
        Debug a virtual cluster by running commands in an ephemeral container

        Example:
        vcluster debug shell my-vcluster --target=syncer
        vcluster debug shell my-vcluster --pod=my-vcluster-pod-0 --target=syncer
