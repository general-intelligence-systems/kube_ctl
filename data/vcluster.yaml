    - name: vcluster certs rotate
      synopsis: Rotates control-plane client and server certs
      description: |-
        ##############################################################
        ################### vcluster certs rotate ####################
        ##############################################################
        Rotates the control-plane client and server leaf certificates
        of the given virtual cluster.

        Examples:
        vcluster -n test certs rotate test
        ##############################################################
      usage: vcluster certs rotate VCLUSTER_NAME [flags]
      inherited_options:
