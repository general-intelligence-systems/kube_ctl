    - name: vcluster delete
      synopsis: Deletes a virtual cluster
      description: |-
        #######################################################
        ################### vcluster delete ###################
        #######################################################
        Deletes a virtual cluster

        Example:
        vcluster delete test --namespace test
        #######################################################
      usage: vcluster delete VCLUSTER_NAME [flags]
      options:
        - name: auto-delete-namespace
          default_value: "true"
          usage: If enabled, vcluster will delete the namespace of the vcluster if it was created by vclusterctl. In the case of multi-namespace mode, will also delete all other namespaces created by vcluster
        - name: delete-configmap
          default_value: "false"
          usage: If enabled, vCluster will delete the ConfigMap of the vCluster
        - name: delete-context
          default_value: "true"
          usage: If the corresponding kube context should be deleted if there is any
        - name: delete-namespace
          default_value: "false"
          usage: If enabled, vCluster will delete the namespace of the vCluster. In cases when sync.toHost.namespaces was enabled, any namespaces and resources created due to syncing from the vCluster to the host cluster will also be deleted.
        - name: driver
          usage: The driver to use for managing the virtual cluster, can be either helm, platform, or docker.
        - name: ignore-not-found
          default_value: "false"
          usage: If enabled, vcluster will not error out in case the target vcluster does not exist
        - name: keep-pvc
          default_value: "false"
          usage: If enabled, vcluster will not delete the persistent volume claim of the vcluster
        - name: project
          usage: '[PLATFORM] The vCluster platform project to use'
        - name: wait
          default_value: "true"
          usage: If enabled, vcluster will wait until the vcluster is deleted
      inherited_options:
        - name: config
          default_value: /home/nathan/.vcluster/config.json
          usage: The vcluster CLI config to use (will be created if it does not exist)
        - name: context
          usage: The kubernetes config context to use
        - name: debug
