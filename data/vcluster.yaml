        - name: namespace
          shorthand: "n"
          usage: The kubernetes namespace to use
        - name: silent
          shorthand: s
          default_value: "false"
          usage: Run in silent mode and prevents any vcluster log output except panics & fatals
    - name: vcluster certs rotate-ca
      synopsis: Rotates the CA certificate
      description: |-
        ##############################################################
        ################## vcluster certs rotate-ca ##################
        ##############################################################
        Rotates the CA certificates of the given virtual cluster using
        the current CA certificates.
        The CA files (ca.{crt,key}) can be placed in the PKI directory
        (either /data/pki or /var/lib/vcluster/pki) to issue new leaf
        certificates to be signed by that CA.
        If the ca.crt file is a bundle containing multiple certificates
        the new CA cert must be the first one in the bundle.

        Examples:
        vcluster certs rotate-ca test
        ##############################################################
      usage: vcluster certs rotate-ca VCLUSTER_NAME [flags]
      inherited_options:
        - name: config
          default_value: /home/nathan/.vcluster/config.json
          usage: The vcluster CLI config to use (will be created if it does not exist)
        - name: context
          usage: The kubernetes config context to use
        - name: debug
          default_value: "false"
          usage: Prints the stack trace if an error occurs
        - name: log-output
          default_value: plain
          usage: The log format to use. Can be either plain, raw or json
        - name: namespace
          shorthand: "n"
          usage: The kubernetes namespace to use
        - name: silent
          shorthand: s
          default_value: "false"
          usage: Run in silent mode and prevents any vcluster log output except panics & fatals
    - name: vcluster connect
      synopsis: Connect to a virtual cluster
      description: |-
        #######################################################
        ################## vcluster connect ###################
        #######################################################
        Connect to a virtual cluster

        Example:
        vcluster connect test --namespace test
        # Open a new bash with the vcluster KUBECONFIG defined
        vcluster connect test -n test -- bash
        vcluster connect test -n test -- kubectl get ns
        #######################################################
      usage: vcluster connect VCLUSTER_NAME [flags]
      options:
        - name: address
          usage: The local address to start port forwarding under
        - name: background-proxy
          default_value: "true"
          usage: Try to use a background-proxy to access the vCluster. Only works if docker is installed and reachable
        - name: background-proxy-image
          default_value: 'ghcr.io/loft-sh/vcluster-pro:'
          usage: The image to use for the background proxy. Only used if --background-proxy is enabled.
        - name: cluster-role
          usage: If specified, vCluster will create the service account if it does not exist and also add a cluster role binding for the given cluster role to it. Requires --service-account to be set
        - name: driver
          usage: The driver to use for managing the virtual cluster, can be either helm, platform, or docker.
        - name: insecure
          default_value: "false"
          usage: If specified, vCluster will create the kube config with insecure-skip-tls-verify
        - name: local-port
          default_value: "0"
          usage: The local port to forward the virtual cluster to. If empty, vCluster will use a random unused port
        - name: pod
          usage: The pod to connect to
        - name: print
          default_value: "false"
          usage: When enabled prints the context to stdout
        - name: project
          usage: '[PLATFORM] The platform project the vCluster is in'
        - name: server
          usage: The server to connect to
        - name: service-account
          usage: If specified, vCluster will create a service account token to connect to the virtual cluster instead of using the default client cert / key. Service account must exist and can be used as namespace/name.
        - name: token-expiration
          default_value: "0"
          usage: If specified, vCluster will create the service account token for the given duration in seconds. Defaults to eternal
      inherited_options:
        - name: config
          default_value: /home/nathan/.vcluster/config.json
          usage: The vcluster CLI config to use (will be created if it does not exist)
        - name: context
          usage: The kubernetes config context to use
        - name: debug
          default_value: "false"
          usage: Prints the stack trace if an error occurs
        - name: log-output
          default_value: plain
          usage: The log format to use. Can be either plain, raw or json
        - name: namespace
          shorthand: "n"
          usage: The kubernetes namespace to use
        - name: silent
          shorthand: s
          default_value: "false"
          usage: Run in silent mode and prevents any vcluster log output except panics & fatals
    - name: vcluster create
      synopsis: Create a new virtual cluster
      description: |-
        #######################################################
        ################### vcluster create ###################
        #######################################################
        Creates a new virtual cluster

        Example:
        vcluster create test --namespace test
        #######################################################
      usage: vcluster create VCLUSTER_NAME [flags]
      options:
        - name: add
          default_value: "true"
          usage: Adds the virtual cluster automatically to the current vCluster platform when using helm driver
        - name: annotations
          default_value: '[]'
          usage: '[PLATFORM] Comma separated annotations to apply to the virtualclusterinstance'
        - name: background-proxy
          default_value: "true"
          usage: Try to use a background-proxy to access the vCluster. Only works if docker is installed and reachable
        - name: background-proxy-image
          default_value: 'ghcr.io/loft-sh/vcluster-pro:'
          usage: The image to use for the background proxy. Only used if --background-proxy is enabled.
        - name: chart-name
          default_value: vcluster
          usage: The virtual cluster chart name to use
        - name: chart-repo
          default_value: https://charts.loft.sh
          usage: The virtual cluster chart repo to use
        - name: chart-version
          usage: The virtual cluster chart version to use (e.g. v0.9.1)
        - name: cluster
          usage: '[PLATFORM] The vCluster platform connected cluster to use'
        - name: connect
          default_value: "true"
          usage: If true will run vcluster connect directly after the vcluster was created
        - name: create-namespace
          default_value: "true"
          usage: If true the namespace will be created if it does not exist
        - name: description
          usage: '[PLATFORM] The description to show in the platform UI for this virtual cluster'
        - name: display-name
          usage: '[PLATFORM] The display name to show in the platform UI for this virtual cluster'
        - name: driver
          usage: The driver to use for managing the virtual cluster, can be either helm, platform, or docker.
        - name: expose
          default_value: "false"
          usage: If true will create a load balancer service to expose the vcluster endpoint
        - name: kube-config-context-name
          usage: If set, will override the context name of the generated virtual cluster kube config with this name
        - name: labels
          shorthand: l
          default_value: '[]'
          usage: '[PLATFORM] Comma separated labels to apply to the virtualclusterinstance'
        - name: link
          default_value: '[]'
          usage: '[PLATFORM] A link to add to the vCluster. E.g. --link ''prod=http://exampleprod.com'''
        - name: parameters
          usage: '[PLATFORM] If a template is used, this can be used to use a file for the parameters. E.g. --parameters path/to/my/file.yaml'
        - name: params
          usage: '[PLATFORM] If a template is used, this can be used to use a file for the parameters. E.g. --params path/to/my/file.yaml'
        - name: print
          default_value: "false"
          usage: If enabled, prints the context to the console
        - name: project
          usage: '[PLATFORM] The vCluster platform project to use'
        - name: recreate
          default_value: "false"
          usage: '[PLATFORM] If enabled and there already exists a virtual cluster with this name, it will be deleted first'
        - name: restore
          usage: Restore the virtual cluster from a backup. E.g. --restore oci://ghcr.io/my-user/my-repo:my-tag
        - name: set
          default_value: '[]'
          usage: Set values for helm. E.g. --set 'persistence.enabled=true'
        - name: set-parameters
          default_value: '[]'
          usage: '[PLATFORM] If a template is used, this can be used to set a specific parameter. E.g. --set-parameter ''my-param=my-value'''
        - name: set-params
          default_value: '[]'
          usage: '[PLATFORM] If a template is used, this can be used to set a specific parameter. E.g. --set-param ''my-param=my-value'''
        - name: skip-wait
          default_value: "false"
          usage: '[PLATFORM] If true, will not wait until the virtual cluster is running'
        - name: team
          usage: '[PLATFORM] The team to create the space for'
        - name: template
          usage: '[PLATFORM] The vCluster platform template to use'
        - name: template-version
          usage: '[PLATFORM] The vCluster platform template version to use'
        - name: upgrade
          default_value: "false"
          usage: If true will try to upgrade the vcluster instead of failing if it already exists
        - name: use
          default_value: "false"
          usage: '[PLATFORM] If the platform should use the virtual cluster if its already there'
        - name: user
          usage: '[PLATFORM] The user to create the space for'
        - name: values
          shorthand: f
          default_value: '[]'
          usage: Path where to load extra helm values from
      inherited_options:
        - name: config
          default_value: /home/nathan/.vcluster/config.json
          usage: The vcluster CLI config to use (will be created if it does not exist)
        - name: context
          usage: The kubernetes config context to use
        - name: debug
          default_value: "false"
          usage: Prints the stack trace if an error occurs
        - name: log-output
          default_value: plain
          usage: The log format to use. Can be either plain, raw or json
        - name: namespace
          shorthand: "n"
          usage: The kubernetes namespace to use
        - name: silent
          shorthand: s
          default_value: "false"
          usage: Run in silent mode and prevents any vcluster log output except panics & fatals
