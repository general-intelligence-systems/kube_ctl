    - name: vcluster platform destroy
      synopsis: Destroy a vCluster Platform instance
      description: |-
        ########################################################
        ############# vcluster platform destroy ##################
        ########################################################

        Destroys a vCluster Platform instance in your Kubernetes cluster or Docker.

        IMPORTANT: This action is done against the cluster the the kube-context is pointing to, and not the vCluster Platform instance that is logged in.
        It does not require logging in to vCluster Platform.

        Please make sure you meet the following requirements
        before running this command:

        1. Current kube-context has admin access to the cluster
        2. Helm v3 must be installed

        If you installed vCluster platform using '--docker', use 'vcluster platform destroy --docker' to clean up the Docker container and volume.

        VirtualClusterInstances managed with driver helm will be deleted, but the underlying virtual cluster will not be uninstalled.

        ########################################################
      usage: vcluster platform destroy [flags]
      options:
        - name: context
          usage: The kube context to use for installation
        - name: delete-namespace
          default_value: "true"
          usage: Whether to delete the namespace or not
        - name: docker
          default_value: "false"
          usage: If true, destroys the vCluster platform docker container and volume instead of the Kubernetes installation
        - name: force
          default_value: "false"
          usage: Try uninstalling even if the platform is not installed. '--namespace' is required if true
        - name: force-remove-finalizers
          default_value: "false"
          usage: IMPORTANT! Removing finalizers may cause unintended behaviours like leaving resources behind, but will ensure the platform is uninstalled.
        - name: ignore-not-found
          default_value: "false"
          usage: Exit successfully if platform installation is not found
        - name: namespace
          usage: The namespace vCluster Platform is installed in
        - name: non-interactive
          default_value: "false"
          usage: Will not prompt for confirmation
        - name: timeout-minutes
          default_value: "5"
          usage: How long to try deleting the platform before giving up. May increase when removing finalizers if --force-remove-finalizers is used
      inherited_options:
        - name: config
          default_value: /home/nathan/.vcluster/config.json
          usage: The vcluster CLI config to use (will be created if it does not exist)
        - name: debug
          default_value: "false"
          usage: Prints the stack trace if an error occurs
        - name: log-output
          default_value: plain
          usage: The log format to use. Can be either plain, raw or json
        - name: silent
          shorthand: s
          default_value: "false"
          usage: Run in silent mode and prevents any vcluster log output except panics & fatals
