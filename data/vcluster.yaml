      description: |-
        ########################################################
        ################# loft sleep namespace #################
        ########################################################

        Sleep puts a vCluster platform namespace to sleep
        Example:
        vcluster platform sleep namespace myspace
        vcluster platform sleep namespace myspace --project myproject
        #######################################################
      usage: vcluster platform sleep namespace NAMESPACE_NAME [flags]
      options:
        - name: cluster
          usage: The cluster to use
        - name: prevent-wakeup
          default_value: "-1"
          usage: The amount of seconds this namespace should sleep until it can be woken up again (use 0 for infinite sleeping). During this time the namespace can only be woken up by `vcluster platform wakeup namespace`, manually deleting the annotation on the namespace or through the loft UI
        - name: project
          shorthand: p
          usage: The project to use
      inherited_options:
        - name: config
