    - name: vcluster platform sleep vcluster
      synopsis: Put a virtual cluster to sleep
      description: |-
        ########################################################################
        ################### vcluster platform sleep vcluster ###################
        ########################################################################
        Sleep will stop a virtual cluster and free all its used
        computing resources.

        Sleep will scale down the virtual cluster and delete
        all workloads created through the virtual cluster. Upon resume,
        all workloads will be recreated. Other resources such
        as persistent volume claims, services etc. will not be affected.

        Example:
        vcluster platform sleep vcluster test --namespace test
        ########################################################################
      usage: vcluster platform sleep vcluster VCLUSTER_NAME [flags]
      options:
        - name: prevent-wakeup
          default_value: "-1"
          usage: The amount of seconds this vcluster should sleep until it can be woken up again (use 0 for infinite sleeping). During this time the space can only be woken up by `vcluster resume vcluster`, manually deleting the annotation on the namespace or through the loft UI
        - name: project
          usage: The vCluster platform project to use
      inherited_options:
        - name: config
          default_value: /home/nathan/.vcluster/config.json
          usage: The vcluster CLI config to use (will be created if it does not exist)
        - name: context
          usage: The kubernetes config context to use
        - name: debug
          default_value: "false"
          usage: Prints the stack trace if an error occurs
        - name: log-output
          default_value: plain
          usage: The log format to use. Can be either plain, raw or json
        - name: namespace
          shorthand: "n"
          usage: The kubernetes namespace to use
        - name: silent
          shorthand: s
          default_value: "false"
          usage: Run in silent mode and prevents any vcluster log output except panics & fatals
    - name: vcluster platform start
      synopsis: Start a vCluster platform instance and connect via port-forwarding
      description: |-
        ########################################################
        ############# vcluster platform start ##################
        ########################################################

        Starts a vCluster platform instance in your Kubernetes cluster
        and then establishes a port-forwarding connection.

        Please make sure you meet the following requirements
        before running this command:

        1. Current kube-context has admin access to the cluster
        2. Helm v3 must be installed
        3. kubectl must be installed

        ########################################################
      usage: vcluster platform start [flags]
      options:
        - name: chart-name
          default_value: vcluster-platform
          usage: The chart name to deploy vCluster platform
        - name: chart-path
          usage: The vCluster platform chart path to deploy vCluster platform
        - name: chart-repo
          default_value: https://charts.loft.sh/
          usage: The chart repo to deploy vCluster platform
        - name: context
          usage: The kube context to use for installation
        - name: docker
          default_value: "false"
          usage: If true, vCluster platform will be installed in Docker
        - name: email
          usage: The email to use for the installation
        - name: host
          usage: Provide a hostname to enable ingress and configure its hostname
        - name: local-port
          usage: The local port to bind to if using port-forwarding
        - name: namespace
          default_value: vcluster-platform
          usage: The namespace to install vCluster platform into
        - name: no-login
          default_value: "false"
          usage: If true, vCluster platform will not login to a vCluster platform instance on start
        - name: no-port-forwarding
          default_value: "false"
          usage: If true, vCluster platform will not do port forwarding after installing it
        - name: no-tunnel
          default_value: "false"
          usage: If true, vCluster platform will not create a loft.host tunnel for this installation
        - name: no-wait
          default_value: "false"
          usage: If true, vCluster platform will not wait after installing it
        - name: password
          usage: The password to use for the admin account. (If empty this will be the namespace UID)
        - name: reset
          default_value: "false"
          usage: If true, existing vCluster Platform resources, including the deployment, will be deleted before installing vCluster platform
        - name: reuse-values
          default_value: "true"
          usage: Reuse previous vCluster platform helm values on upgrade
        - name: upgrade
          default_value: "false"
          usage: If true, vCluster platform will try to upgrade the release
        - name: values
          usage: Path to a file for extra vCluster platform helm chart values
        - name: version
          default_value: latest
          usage: The vCluster platform version to install
      inherited_options:
        - name: config
          default_value: /home/nathan/.vcluster/config.json
          usage: The vcluster CLI config to use (will be created if it does not exist)
