    - name: vcluster pause
      synopsis: Pauses a virtual cluster
      description: |-
        #######################################################
        ################### vcluster pause ####################
        #######################################################
        Pause will stop a virtual cluster and free all its used
        computing resources.

        Pause will scale down the virtual cluster and delete
        all workloads created through the virtual cluster. Upon resume,
        all workloads will be recreated. Other resources such
        as persistent volume claims, services etc. will not be affected.

        Example:
        vcluster pause test --namespace test
        #######################################################
      usage: vcluster pause VCLUSTER_NAME [flags]
      options:
        - name: driver
          usage: The driver for the virtual cluster, can be either helm, platform, or docker.
        - name: prevent-wakeup
          default_value: "-1"
          usage: '[PLATFORM] The amount of seconds this vcluster should sleep until it can be woken up again (use 0 for infinite sleeping). During this time the space can only be woken up by `vcluster resume vcluster`, manually deleting the annotation on the namespace or through the loft UI'
        - name: project
          usage: '[PLATFORM] The vCluster platform project to use'
      inherited_options:
        - name: config
          default_value: /home/nathan/.vcluster/config.json
          usage: The vcluster CLI config to use (will be created if it does not exist)
        - name: context
          usage: The kubernetes config context to use
        - name: debug
          default_value: "false"
          usage: Prints the stack trace if an error occurs
        - name: log-output
          default_value: plain
          usage: The log format to use. Can be either plain, raw or json
        - name: namespace
          shorthand: "n"
          usage: The kubernetes namespace to use
        - name: silent
          shorthand: s
          default_value: "false"
          usage: Run in silent mode and prevents any vcluster log output except panics & fatals
