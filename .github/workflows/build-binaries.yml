name: Build binaries

on:
  workflow_call:
  workflow_dispatch: 

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            nix-system: x86_64-linux
          - arch: arm64
            runner: ubuntu-24.04-arm
            nix-system: aarch64-linux

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Build kubectl, helm, and vcluster
        run: |
          nix build .#kubectl  --system ${{ matrix.nix-system }} -o result-kubectl
          nix build .#helm     --system ${{ matrix.nix-system }} -o result-helm
          nix build .#vcluster --system ${{ matrix.nix-system }} -o result-vcluster
          mkdir -p dist
          cp -Lf result-kubectl/bin/kubectl   dist/kubectl-linux-${{ matrix.arch }}
          cp -Lf result-helm/bin/helm         dist/helm-linux-${{ matrix.arch }}
          cp -Lf result-vcluster/bin/vcluster dist/vcluster-linux-${{ matrix.arch }}
          chmod +x dist/*

      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS-linux-${{ matrix.arch }}.txt

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: dist/*
